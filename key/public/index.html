<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SacRedBS — Bloodstrike Key Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@500;700&display=swap');

        * { box-sizing: border-box; }

        body {
            background-color: #08090f;
            background-image:
                radial-gradient(ellipse at 20% 60%, rgba(180,20,20,0.12), transparent 40%),
                radial-gradient(ellipse at 80% 20%, rgba(80,10,10,0.18), transparent 40%),
                radial-gradient(ellipse at 50% 100%, rgba(139,0,0,0.08), transparent 50%);
            color: white;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Animated starfield */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: white;
            animation: twinkle var(--dur) ease-in-out infinite alternate;
        }
        @keyframes twinkle { from { opacity: var(--a1); } to { opacity: var(--a2); } }

        /* Card */
        .card {
            background: linear-gradient(145deg, rgba(18,6,6,0.97), rgba(12,3,3,0.98));
            border: 1px solid rgba(180,20,20,0.3);
            box-shadow:
                0 0 60px rgba(180,20,20,0.12),
                0 0 120px rgba(180,20,20,0.06),
                inset 0 1px 0 rgba(255,255,255,0.04);
            position: relative;
            z-index: 10;
        }
        .card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(220,30,30,0.25) 0%, transparent 50%, rgba(220,30,30,0.1) 100%);
            pointer-events: none;
        }

        /* Logo SVG glow */
        .logo-wrap {
            position: relative;
            display: inline-block;
        }
        .logo-glow {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,30,30,0.35) 0%, transparent 70%);
            animation: logoGlow 3s ease-in-out infinite alternate;
        }
        @keyframes logoGlow {
            from { opacity: 0.5; transform: scale(0.95); }
            to   { opacity: 1.0; transform: scale(1.05); }
        }

        /* Title */
        .brand-title {
            font-family: 'Cinzel', serif;
            font-weight: 900;
            letter-spacing: 0.05em;
            background: linear-gradient(135deg, #ff4444 0%, #ff8888 40%, #ff2222 70%, #ffaa44 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(255,50,50,0.5));
        }

        /* Status box */
        .status-box {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(180,20,20,0.25);
            border-radius: 10px;
            padding: 12px 16px;
        }

        /* Generate button */
        .gen-btn {
            background: linear-gradient(135deg, #8b0000, #cc1111, #8b0000);
            background-size: 200% 100%;
            border: 1px solid rgba(255,60,60,0.4);
            border-radius: 10px;
            color: white;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.08em;
            padding: 14px 24px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(180,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
            position: relative;
            overflow: hidden;
        }
        .gen-btn:not(:disabled):hover {
            background-position: right center;
            box-shadow: 0 0 35px rgba(220,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            transform: translateY(-1px);
        }
        .gen-btn:disabled {
            opacity: 0.75;
            cursor: not-allowed;
            transform: none;
        }
        .gen-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.5s ease;
        }
        .gen-btn:not(:disabled):hover::after { transform: translateX(100%); }

        /* Key display */
        .key-box {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(220,30,30,0.5);
            border-radius: 10px;
            padding: 16px;
            cursor: pointer;
            position: relative;
            transition: border-color 0.2s;
        }
        .key-box:hover { border-color: rgba(255,60,60,0.8); }
        .key-box::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: rgba(180,0,0,0.06);
            pointer-events: none;
        }
        .key-text {
            font-family: 'Courier New', monospace;
            color: #ff8888;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            word-break: break-all;
            filter: drop-shadow(0 0 6px rgba(255,60,60,0.4));
        }

        /* Divider */
        .divider {
            border: none;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(180,20,20,0.4), transparent);
            margin: 20px 0;
        }

        /* Spinner */
        .spin { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Pulse dot */
        .dot-pulse { animation: dotpulse 1.5s ease-in-out infinite; }
        @keyframes dotpulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.6; transform:scale(0.8); } }
    </style>
</head>
<body>

    <!-- Starfield -->
    <div class="stars" id="stars"></div>

    <!-- Card -->
    <div class="card rounded-2xl p-7 sm:p-10 w-[92%] max-w-md mx-auto text-center">

        <!-- Logo -->
        <div class="logo-wrap mb-5">
            <div class="logo-glow"></div>
            <svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg" style="filter:drop-shadow(0 0 12px rgba(200,30,30,0.6))">
                <defs>
                    <radialGradient id="shieldBg" cx="50%" cy="35%" r="65%">
                        <stop offset="0%" stop-color="#2a0808"/>
                        <stop offset="100%" stop-color="#0d0101"/>
                    </radialGradient>
                    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff6b6b"/>
                        <stop offset="40%" stop-color="#cc2222"/>
                        <stop offset="100%" stop-color="#ff8800"/>
                    </linearGradient>
                    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" stop-color="#ffdddd"/>
                        <stop offset="50%" stop-color="#ff6666"/>
                        <stop offset="100%" stop-color="#cc2200"/>
                    </linearGradient>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="1.5" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
                <!-- Shield body -->
                <path d="M48 4 L88 18 L88 52 Q88 76 48 92 Q8 76 8 52 L8 18 Z"
                      fill="url(#shieldBg)" stroke="url(#rimGrad)" stroke-width="2.5"/>
                <!-- Inner shield ring -->
                <path d="M48 12 L80 24 L80 52 Q80 70 48 83 Q16 70 16 52 L16 24 Z"
                      fill="none" stroke="rgba(180,30,30,0.5)" stroke-width="1"/>
                <!-- Crown/top decoration -->
                <path d="M32 18 L40 10 L48 16 L56 10 L64 18" fill="none" stroke="url(#rimGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <!-- SBS letters -->
                <text x="48" y="54" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900"
                      font-size="22" fill="url(#textGrad)" filter="url(#glow)" letter-spacing="1">SBS</text>
                <!-- Bottom decorative line -->
                <path d="M28 60 L68 60" stroke="rgba(180,30,30,0.6)" stroke-width="1.5" stroke-linecap="round"/>
                <!-- Wing accents -->
                <path d="M20 38 Q12 42 16 50" fill="none" stroke="rgba(180,30,30,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M76 38 Q84 42 80 50" fill="none" stroke="rgba(180,30,30,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                <!-- Center gem -->
                <circle cx="48" cy="34" r="5" fill="url(#rimGrad)" opacity="0.85"/>
                <circle cx="48" cy="34" r="2.5" fill="#ffdddd" opacity="0.6"/>
            </svg>
        </div>

        <!-- Brand -->
        <h1 class="brand-title text-4xl sm:text-5xl mb-1">SacRedBS</h1>
        <p style="color:rgba(180,80,80,0.7); font-size:0.7rem; letter-spacing:0.25em; font-weight:600; text-transform:uppercase;" class="mb-6">
            Bloodstrike Key Generator
        </p>

        <hr class="divider">

        <!-- Generate section -->
        <div id="generate-section">
            <div class="status-box mb-5" id="status-box">
                <p id="status-text" class="text-sm flex items-center justify-center gap-2" style="color:rgba(200,120,120,0.8);">
                    <svg class="spin" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/>
                        <path d="M12 2a10 10 0 0 1 10 10"/>
                    </svg>
                    Waiting for HWID...
                </p>
            </div>

            <button id="start-btn" class="gen-btn hidden" onclick="startGeneration()">
                GENERATE KEY
            </button>

            <p id="error-msg" class="hidden text-xs mt-3" style="color:#ff6666;"></p>
            <button id="retry-btn" class="hidden gen-btn mt-3 text-sm py-2" onclick="retry()" style="background:linear-gradient(135deg,#3a0000,#660000,#3a0000);">
                ↻ RETRY
            </button>
        </div>

        <!-- Success section -->
        <div id="success-section" class="hidden">
            <div class="flex items-center justify-center gap-2 mb-3">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span style="color:#4ade80; font-family:'Cinzel',serif; font-weight:700; font-size:1.1rem;">Access Granted</span>
            </div>
            <p style="color:rgba(200,150,150,0.7); font-size:0.8rem;" class="mb-4">Your 24-hour hardware-locked key:</p>

            <div class="key-box mb-2" onclick="copyKey()">
                <div class="key-text" id="key-display"></div>
            </div>
            <p id="copy-hint" style="color:rgba(180,80,80,0.6); font-size:0.72rem; transition:color 0.2s;">
                Tap key to copy · Valid 24 hours
            </p>
        </div>

    </div>

    <script>
        // ── Starfield ───────────────────────────────────────────
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 80; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2 + 0.5;
            const a1 = (Math.random() * 0.4 + 0.1).toFixed(2);
            const a2 = (Math.random() * 0.6 + 0.3).toFixed(2);
            s.style.cssText = `
                width:${size}px; height:${size}px;
                left:${Math.random()*100}%; top:${Math.random()*100}%;
                --dur:${(Math.random()*4+2).toFixed(1)}s;
                --a1:${a1}; --a2:${a2}; opacity:${a1};
            `;
            starsEl.appendChild(s);
        }

        // ── URL Params ──────────────────────────────────────────
        const params       = new URLSearchParams(window.location.search);
        const hwid         = params.get('hwid');
        const signature    = params.get('signature');
        const generatedKey = params.get('generated_key');
        const isSuccess    = params.get('success');

        const genSection  = document.getElementById('generate-section');
        const sucSection  = document.getElementById('success-section');
        const startBtn    = document.getElementById('start-btn');
        const statusText  = document.getElementById('status-text');
        const statusBox   = document.getElementById('status-box');
        const errorMsg    = document.getElementById('error-msg');
        const retryBtn    = document.getElementById('retry-btn');

        // ── Init state ──────────────────────────────────────────
        if (isSuccess === 'true' && generatedKey) {
            genSection.classList.add('hidden');
            sucSection.classList.remove('hidden');
            document.getElementById('key-display').textContent = generatedKey;

        } else if (hwid && signature) {
            startBtn.classList.remove('hidden');
            statusText.innerHTML = `
                <span class="dot-pulse" style="width:9px;height:9px;border-radius:50%;background:#4ade80;display:inline-block;"></span>
                HWID Linked &amp; Ready
            `;
            statusText.style.color = '#86efac';

        } else {
            statusText.innerHTML = `
                <span style="width:9px;height:9px;border-radius:50%;background:#f87171;display:inline-block;"></span>
                Error: Missing HWID or Security Signature
            `;
            statusText.style.color = '#f87171';
        }

        // ── Generate Key ────────────────────────────────────────
        const genUrl = () => `/generateKey?hwid=${encodeURIComponent(hwid)}&signature=${encodeURIComponent(signature)}`;

        async function startGeneration() {
            if (!hwid || !signature) { showError('Missing security parameters.'); return; }

            setLoading(true);

            try {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), 20000);

                // Use redirect:'manual' so we can detect server-side redirects (old Vercel)
                // vs JSON response (new server)
                const resp = await fetch(genUrl(), {
                    signal: controller.signal,
                    redirect: 'manual'
                });
                clearTimeout(timeout);

                // Server sent a redirect (old Vercel behavior) → navigate the page directly
                if (resp.type === 'opaqueredirect') {
                    window.location.href = genUrl();
                    return; // page will navigate away
                }

                if (!resp.ok) throw new Error('Server error ' + resp.status);

                const contentType = resp.headers.get('content-type') || '';

                // New server returns JSON
                if (contentType.includes('json')) {
                    const data = await resp.json();
                    if (data.error) { showError(data.error); return; }
                    if (data.redirect) {
                        setLoading(true, 'Opening ad link...');
                        // If the tab/redirect never resolves, show retry after 20s
                        setTimeout(() => {
                            showError('Ad page did not load. Tap RETRY — make sure popups / redirects are allowed.');
                        }, 20000);
                        window.location.href = data.redirect;
                        return;
                    }
                }

                // Fallback: try page navigation directly
                window.location.href = genUrl();

            } catch (err) {
                if (err.name === 'AbortError') {
                    showError('Request timed out. Check your connection and retry.');
                } else {
                    // Last resort — direct navigation (handles CORS/network quirks)
                    window.location.href = genUrl();
                }
            }
        }

        function setLoading(on, msg) {
            if (on) {
                startBtn.disabled = true;
                startBtn.innerHTML = `
                    <span style="display:flex;align-items:center;justify-content:center;gap:8px;">
                        <svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
                            <circle cx="12" cy="12" r="10" stroke-opacity="0.3"/>
                            <path d="M12 2a10 10 0 0 1 10 10"/>
                        </svg>
                        ${msg || 'Generating link...'}
                    </span>
                `;
                statusText.innerHTML = `
                    <svg class="spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <circle cx="12" cy="12" r="10" stroke-opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10"/>
                    </svg>
                    ${msg || 'Connecting to key server...'}
                `;
                statusText.style.color = 'rgba(200,150,150,0.8)';
                errorMsg.classList.add('hidden');
                retryBtn.classList.add('hidden');
            }
        }

        function showError(msg) {
            startBtn.disabled = false;
            startBtn.innerHTML = 'GENERATE KEY';
            statusText.innerHTML = `
                <span style="width:9px;height:9px;border-radius:50%;background:#f87171;display:inline-block;"></span>
                HWID Linked &amp; Ready
            `;
            statusText.style.color = '#86efac';
            errorMsg.textContent = '⚠ ' + msg;
            errorMsg.classList.remove('hidden');
            retryBtn.classList.remove('hidden');
        }

        function retry() { startGeneration(); }

        // ── Copy Key ────────────────────────────────────────────
        function copyKey() {
            const keyText = document.getElementById('key-display').textContent;
            const hint = document.getElementById('copy-hint');
            navigator.clipboard.writeText(keyText).then(() => {
                hint.textContent = '✓ Copied to clipboard!';
                hint.style.color = '#4ade80';
                setTimeout(() => {
                    hint.textContent = 'Tap key to copy · Valid 24 hours';
                    hint.style.color = 'rgba(180,80,80,0.6)';
                }, 2500);
            }).catch(() => {
                hint.textContent = 'Copy manually: long-press the key';
                hint.style.color = '#facc15';
            });
        }
    </script>

</body>
</html>
