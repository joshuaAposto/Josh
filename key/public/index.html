<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RyukoBS - Bloodstrike Key Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: {
                            900: '#0b0f19',
                            800: '#111827',
                            accent: '#3b82f6',
                            glow: '#60a5fa'
                        }
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0b0f19;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.15), transparent 25%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background: transparent url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MDAiIGhlaWdodD0iNDAwIj48Y2lyY2xlIGN4PSIyMDIiIGN5PSIyMDIiIHI9IjEiIGZpbGw9IiNmZmYiIG9wYWNpdHk9IjAuNSIvPjxjaXJjbGUgY3g9IjEwMCIgY3k9IjMwMCIgcj0iMSIgZmlsbD0iI2ZmZiIgb3BhY2l0eT0iMC4zIi8+PGNpcmNsZSBjeD0iMzUwIiBjeT0iMTAwIiByPSIxIiBmaWxsPSIjZmZmIiBvcGFjaXR5PSIwLjgiLz48L3N2Zz4=') repeat;
        }
    </style>
</head>
<body class="antialiased">

    <div class="stars"></div>

    <div class="relative bg-space-800/40 backdrop-blur-xl border border-white/10 p-6 sm:p-10 lg:p-12 rounded-2xl sm:rounded-3xl shadow-[0_0_50px_rgba(59,130,246,0.15)] w-[92%] sm:w-3/4 md:max-w-lg lg:max-w-xl mx-auto text-center z-10 my-6 sm:my-0">
        
        <div class="relative inline-block mb-4 sm:mb-6 lg:mb-8">
            <div class="absolute inset-0 bg-blue-500 blur-xl opacity-20 rounded-full animate-pulse-slow"></div>
            <img src="logo/logo.png" alt="RyukoBS Logo" class="relative w-20 h-20 sm:w-28 sm:h-28 lg:w-32 lg:h-32 mx-auto rounded-full border-2 border-blue-500/50 object-cover shadow-[0_0_20px_rgba(59,130,246,0.4)]">
        </div>

        <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-1 lg:mb-2">
            RyukoBS
        </h1>
        <p class="text-[10px] sm:text-xs lg:text-sm font-semibold uppercase tracking-[0.2em] sm:tracking-[0.3em] text-blue-300/70 mb-6 sm:mb-8 lg:mb-10">
            Bloodstrike Key Generator!
        </p>

        <div id="generate-section" class="transition-all duration-500">
            <div class="bg-black/30 rounded-lg p-3 sm:p-4 mb-5 sm:mb-6 border border-white/5">
                <p id="status-text" class="text-gray-400 text-xs sm:text-sm lg:text-base flex items-center justify-center gap-2">
                    <svg class="animate-spin h-4 w-4 sm:h-5 sm:w-5 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    Waiting for HWID...
                </p>
            </div>
            
            <button id="start-btn" class="hidden w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-3 sm:py-4 px-6 rounded-lg text-sm sm:text-base lg:text-lg transition-all duration-300 transform hover:-translate-y-1 hover:shadow-[0_0_20px_rgba(59,130,246,0.5)] border border-blue-400/20" onclick="startGeneration()">
                GENERATE KEY
            </button>
        </div>

        <div id="success-section" class="hidden transition-all duration-500">
            <div class="mb-3 sm:mb-4 text-green-400 flex items-center justify-center gap-2">
                <svg class="w-5 h-5 sm:w-6 sm:h-6 lg:w-8 lg:h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <h2 class="text-lg sm:text-xl lg:text-2xl font-bold">Access Granted</h2>
            </div>
            <p class="text-gray-400 text-xs sm:text-sm lg:text-base mb-3 sm:mb-4">Your 24-hour hardware key is ready:</p>
            
            <div class="relative group cursor-pointer" onclick="copyKey()">
                <div class="absolute inset-0 bg-blue-500 opacity-20 blur-md rounded-lg group-hover:opacity-40 transition-opacity"></div>
                <div class="relative bg-black/50 border border-blue-500/50 p-3 sm:p-4 rounded-lg font-mono text-lg sm:text-xl lg:text-3xl text-blue-200 break-all select-all tracking-wider" id="key-display"></div>
                <p id="copy-hint" class="text-[10px] sm:text-xs lg:text-sm text-blue-400/50 mt-2 transition-colors group-hover:text-blue-400">Click the box to copy</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const hwid = urlParams.get('hwid');
        const signature = urlParams.get('signature');
        const generatedKey = urlParams.get('generated_key');
        const isSuccess = urlParams.get('success');

        const generateSection = document.getElementById('generate-section');
        const successSection = document.getElementById('success-section');
        const startBtn = document.getElementById('start-btn');
        const statusText = document.getElementById('status-text');

        if (isSuccess === 'true' && generatedKey) {
            generateSection.classList.add('hidden');
            successSection.classList.remove('hidden');
            document.getElementById('key-display').innerText = generatedKey;
        } else if (hwid && signature) {
            startBtn.classList.remove('hidden');
            statusText.innerHTML = `<span class="w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full bg-green-500 animate-pulse"></span> HWID Linked &amp; Ready`;
            statusText.classList.replace('text-gray-400', 'text-blue-300');
        } else {
            statusText.innerHTML = `<span class="w-2 h-2 sm:w-2.5 sm:h-2.5 rounded-full bg-red-500"></span> Error: Missing HWID or Security Signature`;
            statusText.classList.replace('text-gray-400', 'text-red-400');
        }

        function startGeneration() {
            if (hwid && signature) {
                startBtn.innerHTML = `<svg class="animate-spin h-5 w-5 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
                startBtn.classList.add('opacity-80', 'cursor-not-allowed');
                window.location.href = `/generateKey?hwid=${encodeURIComponent(hwid)}&signature=${encodeURIComponent(signature)}`;
            } else {
                alert("Cannot generate link: Missing security parameters.");
            }
        }

        function copyKey() {
            const keyText = document.getElementById('key-display').innerText;
            navigator.clipboard.writeText(keyText).then(() => {
                const hint = document.getElementById('copy-hint');
                hint.innerText = "Copied to clipboard!";
                hint.classList.replace('text-blue-400/50', 'text-green-400');
                setTimeout(() => {
                    hint.innerText = "Click the box to copy";
                    hint.classList.replace('text-green-400', 'text-blue-400/50');
                }, 2000);
            });
        }
    </script>

</body>
</html>
